# =============================================================================
# plexcare-idp-api — local dev infra (MySQL + MailHog).
# Keycloak e Kafka são reaproveitados da stack do plexcare-teleconf-service
# (platform/backend/plexcare-teleconf-service/docker-compose.dev.yml) — suba-a
# primeiro antes deste compose.
# =============================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: plexcare-idp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-db_plexcare_tenancy}
      MYSQL_USER: ${MYSQL_USER:-plexcare}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-plexcare}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - idp_mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailhog:
    image: mailhog/mailhog:latest
    container_name: plexcare-idp-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

volumes:
  idp_mysql_data:
