# Air — hot reload para desenvolvimento local
# Doc: https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  # SERVICE é injetado pelo docker-compose como env var
  cmd = "go build -o ./tmp/main ./cmd/${SERVICE}"
  bin = "./tmp/main"
  delay = 500  # ms — evita rebuild a cada keystroke
  exclude_dir = ["tmp", "vendor", "testdata", "migrations"]
  include_ext = ["go"]
  exclude_regex = ["_test\\.go$"]
  kill_delay = "2s"

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
